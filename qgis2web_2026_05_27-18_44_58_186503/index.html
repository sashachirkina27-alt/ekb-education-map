        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }

        // ========== HEATMAP UTILITY ==========
        function weightedGeoJson2Heat(geojson, weightField) {
            var points = [], vals = [];
            if (!geojson || !geojson.features) return points;
            geojson.features.forEach(function(f) {
                var v = parseFloat(f.properties[weightField]);
                if (!isNaN(v) && v > 0) vals.push(v);
            });
            if (!vals.length) return points;
            var maxVal = Math.max.apply(null, vals);
            geojson.features.forEach(function(f) {
                if (!f.geometry || !f.geometry.coordinates) return;
                var v = parseFloat(f.properties[weightField]);
                if (!isNaN(v) && v > 0)
                    points.push([f.geometry.coordinates[1], f.geometry.coordinates[0], v / maxVal]);
            });
            return points;
        }

        // ========== HEATMAP SCHOOLS ==========
        var layer_shk_itog_4 = new L.heatLayer(
            weightedGeoJson2Heat(json_shk_itog_4, 'people_sum_sum'), {
            radius: 30, blur: 10, max: 1.0, minOpacity: 0.2,
            gradient: {0.0:'rgba(255,255,255,0)', 0.2:'rgba(140,205,247,0.55)', 0.4:'rgba(107,181,226,0.75)', 0.6:'rgba(53,139,186,0.9)', 0.85:'rgba(14,101,146,0.97)', 1.0:'rgba(0,85,124,1.0)'}
        });

        // ========== HEATMAP KINDERGARTENS ==========
        var layer_shk_itog1_5 = new L.heatLayer(
            weightedGeoJson2Heat(json_shk_itog1_5, 'people_sum_sum'), {
            radius: 30, blur: 10, max: 1.0, minOpacity: 0.2,
            gradient: {0.0:'rgba(255,255,255,0)', 0.2:'rgba(213,209,112,0.55)', 0.4:'rgba(170,185,82,0.75)', 0.6:'rgba(125,157,58,0.9)', 0.85:'rgba(82,129,35,0.97)', 1.0:'rgba(0,45,4,1.0)'}
        });

        // ========== SIMPLIFIED KADASTR POPUP ==========
        function pop_simplified_kadastr_6(feature, layer) {
            var p = feature.properties;
            var idx = parseFloat(p['provision_mean'] || p['provision_index'] || 0);
            var cl  = idx <= 9.3 ? '#e28888' : idx <= 31.3 ? '#f4b794' : idx <= 63.2 ? '#f4d3a8' : idx <= 112.6 ? '#dfe5b9' : '#c4dc8c';
            var norm=196, pct=Math.min(idx/norm*100,100), W=140, bw=Math.round(pct/100*W);
            var h = '<div style="font-family:Arial,sans-serif;font-size:12px;width:220px;">'
              + '<div style="border-bottom:3px solid '+cl+';padding-bottom:5px;margin-bottom:8px;">'
              +   '<div style="font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.5px">Кадастровый квартал</div>'
              +   '<div style="margin-top:3px;font-size:12px">Индекс: <span style="font-weight:bold;font-size:15px;color:#333">'+idx.toFixed(1)+'</span><span style="color:#aaa;font-size:10px"> мест/1000 чел.</span></div>'
              + '</div>'
              + '<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:#555">Обеспеченность</span><span style="font-weight:bold;color:#333">'+pct.toFixed(0)+'%</span></div>'
              + '<div style="position:relative;height:12px;background:#eee;border-radius:3px;width:'+W+'px">'
              +   '<div style="height:12px;width:'+bw+'px;background:'+cl+';border-radius:3px"></div>'
              +   '<div style="position:absolute;right:0;top:-3px;width:2px;height:18px;background:#666;opacity:.4"></div>'
              + '</div>'
              + '<div style="font-size:10px;color:#bbb;margin-top:1px">норма: '+norm+' мест/1000 чел.</div>'
              + '</div>';
            layer.bindPopup(h, {maxWidth:260});
        }

        function style_simplified_kadastr_6_0(feature) {
            var v = parseFloat(feature.properties['provision_mean'] || feature.properties['provision_index'] || 0);
            var fillColor, strokeColor;
            if      (v <= 9.330769)   { fillColor='rgba(226,136,136,1.0)'; strokeColor='rgba(145,87,87,1.0)'; }
            else if (v <= 31.347368)  { fillColor='rgba(244,183,148,1.0)'; strokeColor='rgba(150,113,91,1.0)'; }
            else if (v <= 63.175000)  { fillColor='rgba(244,211,168,1.0)'; strokeColor='rgba(149,129,103,1.0)'; }
            else if (v <= 112.552941) { fillColor='rgba(223,229,185,1.0)'; strokeColor='rgba(149,153,124,1.0)'; }
            else                      { fillColor='rgba(196,220,140,1.0)'; strokeColor='rgba(130,146,93,1.0)'; }
            return { pane:'pane_simplified_kadastr_6', opacity:1, color:strokeColor, dashArray:'', lineCap:'butt', lineJoin:'miter', weight:0.8, fill:true, fillOpacity:1, fillColor:fillColor, interactive:true };
        }
        map.createPane('pane_simplified_kadastr_6');
        map.getPane('pane_simplified_kadastr_6').style.zIndex = 406;
        var layer_simplified_kadastr_6 = new L.geoJson(json_simplified_kadastr_6, {
            attribution: '', interactive: true,
            dataVar: 'json_simplified_kadastr_6',
            layerName: 'layer_simplified_kadastr_6',
            pane: 'pane_simplified_kadastr_6',
            onEachFeature: pop_simplified_kadastr_6,
            style: style_simplified_kadastr_6_0,
        });

        // ========== LAYER CONTROL PANEL ==========
        function toggleLayerPanel() {
            var b = document.getElementById('layer-body');
            b.style.display = b.style.display === 'none' ? 'block' : 'none';
        }
        var layerControlDiv = L.control({position: 'topright'});
        layerControlDiv.onAdd = function() {
            var div = L.DomUtil.create('div', 'layer-control');
            div.innerHTML =
                '<div class="layer-control-header" onclick="toggleLayerPanel()">&#x2630; Слои <span style="font-size:10px;color:#aaa">&#9660;</span></div>'
              + '<div id="layer-body">'
              + '<div class="layer-section-title">Тепловые карты</div>'
              + '<label class="layer-item"><input type="checkbox" id="chk-heat-schools" checked> <span class="swatch" style="background:rgba(33,113,181,0.8)"></span> Школы</label>'
              + '<label class="layer-item"><input type="checkbox" id="chk-heat-kinder" checked> <span class="swatch" style="background:rgba(35,139,69,0.8)"></span> Детские сады</label>'
              + '<div class="layer-section-title" style="margin-top:10px">Полигональные слои</div>'
              + '<label class="layer-item"><input type="checkbox" id="chk-kadastr" checked> <span class="swatch" style="background:#f4d3a8;border:1px solid #aaa"></span> Кадастровые кварталы</label>'
              + '<label class="layer-item"><input type="checkbox" id="chk-microd" checked> <span class="swatch" style="background:#c4dc8c;border:1px solid #aaa"></span> Микрорайоны</label>'
              + '<label class="layer-item"><input type="checkbox" id="chk-district" checked> <span class="swatch" style="background:#e28888;border:1px solid #aaa"></span> Районы</label>'
              + '</div>';
            L.DomEvent.disableClickPropagation(div);
            L.DomEvent.disableScrollPropagation(div);
            return div;
        };
        layerControlDiv.addTo(map);

        // ========== LEGEND ==========
        var legendDiv = L.control({position: 'bottomright'});
        legendDiv.onAdd = function() {
            var d = L.DomUtil.create('div', 'legend-panel');
            d.innerHTML = '<h4>Обеспеченность, мест/1000 чел.</h4>'
              + '<div class="legend-row"><div class="legend-color" style="background:#e28888"></div>0 — 9,3</div>'
              + '<div class="legend-row"><div class="legend-color" style="background:#f4b794"></div>9,3 — 31,3</div>'
              + '<div class="legend-row"><div class="legend-color" style="background:#f4d3a8"></div>31,3 — 63,2</div>'
              + '<div class="legend-row"><div class="legend-color" style="background:#dfe5b9"></div>63,2 — 112,6</div>'
              + '<div class="legend-row"><div class="legend-color" style="background:#c4dc8c"></div>112,6 — 197</div>'
              + '<div style="margin-top:6px;font-size:10px;color:#aaa">Норматив: 196 мест/1000 чел.</div>';
            return d;
        };
        legendDiv.addTo(map);

        // ========== INFO PANEL ==========
        var infoDiv = L.control({position: 'bottomleft'});
        infoDiv.onAdd = function() {
            var d = L.DomUtil.create('div', 'info-panel');
            d.innerHTML = '<h3>Доступность соц. инфраструктуры</h3>'
              + '<p>Обеспеченность показывает, сколько мест в школах и детских садах приходится на 1000 жителей в пешеходной доступности от каждого дома. Зоны доступности рассчитаны по реальной дорожной сети: 300 м для детских садов и 500 м для школ согласно СП 42.13330.2016.</p>'
              + '<span class="norm-badge">Норматив: 196 мест / 1000 жителей</span>';
            return d;
        };
        infoDiv.addTo(map);

        // ========== ZOOM INDICATOR ==========
        var zoomInd = L.control({position: 'topleft'});
        zoomInd.onAdd = function() {
            this._el = L.DomUtil.create('div', 'zoom-indicator');
            return this._el;
        };
        zoomInd.addTo(map);

        // ========== LAYER VISIBILITY BY ZOOM ==========
        // Toggle states
        var visState = {schools: true, kinder: true, kadastr: true, microd: true, district: true};

        function updateLayers() {
            var z = map.getZoom();
            // Polygon layers by zoom
            if (visState.kadastr && z >= 13) map.addLayer(layer_simplified_kadastr_6);
            else if (map.hasLayer(layer_simplified_kadastr_6)) map.removeLayer(layer_simplified_kadastr_6);

            if (visState.microd && z >= 11 && z < 13) map.addLayer(layer_microd_joined_crs_2);
            else if (map.hasLayer(layer_microd_joined_crs_2)) map.removeLayer(layer_microd_joined_crs_2);

            if (visState.district && z < 11) map.addLayer(layer_district_joined_crs_3);
            else if (map.hasLayer(layer_district_joined_crs_3)) map.removeLayer(layer_district_joined_crs_3);

            // Heatmaps
            if (visState.schools && z <= 13) map.addLayer(layer_shk_itog_4);
            else if (map.hasLayer(layer_shk_itog_4)) map.removeLayer(layer_shk_itog_4);

            if (visState.kinder && z <= 13) map.addLayer(layer_shk_itog1_5);
            else if (map.hasLayer(layer_shk_itog1_5)) map.removeLayer(layer_shk_itog1_5);

            // Zoom indicator
            if (zoomInd._el) {
                zoomInd._el.innerHTML = z >= 13 ? '&#128205; Кадастровые кварталы'
                    : z >= 11 ? '&#128205; Микрорайоны' : '&#128205; Районы';
            }

            // Heatmap radius
            var r = z < 11 ? 35 : z < 12 ? 25 : z < 13 ? 18 : 12;
            var b = Math.round(r * 0.65);
            if (map.hasLayer(layer_shk_itog_4))  layer_shk_itog_4.setOptions({radius:r, blur:b});
            if (map.hasLayer(layer_shk_itog1_5)) layer_shk_itog1_5.setOptions({radius:r, blur:b});
        }

        map.on('zoomend', updateLayers);

        // ========== CHECKBOX HANDLERS ==========
        function setupCheckboxes() {
            document.getElementById('chk-heat-schools').onchange = function() {
                visState.schools = this.checked; updateLayers();
            };
            document.getElementById('chk-heat-kinder').onchange = function() {
                visState.kinder = this.checked; updateLayers();
            };
            document.getElementById('chk-kadastr').onchange = function() {
                visState.kadastr = this.checked; updateLayers();
            };
            document.getElementById('chk-microd').onchange = function() {
                visState.microd = this.checked; updateLayers();
            };
            document.getElementById('chk-district').onchange = function() {
                visState.district = this.checked; updateLayers();
            };
        }

        // ========== INIT ==========
        setBounds();
        updateLayers();
        setupCheckboxes();

        resetLabels([layer_district_joined_crs_3]);
        map.on('zoomend', function(){ resetLabels([layer_district_joined_crs_3]); });
        map.on('layeradd', function(){ resetLabels([layer_district_joined_crs_3]); });
        map.on('layerremove', function(){ resetLabels([layer_district_joined_crs_3]); });
        </script>
    </body>
</html>
